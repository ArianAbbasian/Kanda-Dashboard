<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers Map</title>
    <style>
        #map {
            height: 400px; 
            width: 100%;
        }
    </style>
    <script src="./wwwroot/js/scripts/ol.js"></script>
</head>

<body>
    <h1>Salam</h1>
    <div id="map"></div>

    <script>

        const map = new ol.Map({
            target: 'map',
            // layers: [
            //     new ol.layer.Tile({ 
            //         source: new ol.source.OSM() 
            //     })
            // ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([51.4, 35.7]),
                zoom: 10
            })
        });
    </script>

</body>

</html>
